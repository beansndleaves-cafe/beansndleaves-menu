<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beans n Leaves Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; margin: 0; overflow: hidden; touch-action: manipulation; }
        .ken-burns { animation: kenburns 8s ease-out forwards; }
        @keyframes kenburns { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .progress-bar-fill { animation: progress 6s linear infinite; }
        .slide { display: none; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { display: block; opacity: 1; }
        
        /* Fade out animation for the start screen */
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }
        @keyframes fadeOut { 0% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

<div id="start-overlay" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center text-center px-6 cursor-pointer" onclick="startExperience()">
    <div class="w-16 h-1 bg-yellow-500 mb-6 rounded-full"></div>
    <h1 class="text-4xl md:text-6xl font-black text-white uppercase tracking-wider mb-4">Beans n Leaves</h1>
    <p class="text-xl md:text-2xl text-white/70 font-medium mb-12">Digital Menu & Ordering</p>
    <div class="animate-bounce bg-yellow-500 text-black px-8 py-4 rounded-full font-bold text-lg shadow-[0_0_20px_rgba(234,179,8,0.5)]">
        Tap anywhere to Start
    </div>
</div>

<div id="menu-container" class="relative w-full h-screen bg-black overflow-hidden select-none"></div>

<div class="absolute bottom-0 left-0 w-full h-1.5 bg-white/5 z-50">
    <div id="progress-bar" class="h-full bg-yellow-500 shadow-[0_0_15px_#eab308] hidden"></div>
</div>

<script>
    const slides = [
        { title: "Student Combo", subtitle: "Chicken Burger + Fries + Chilled Drink", price: "199", image: "img/Burger_combo.jpeg" },
        { title: "Wrap Combo", subtitle: "Signature Wrap + Chilled Drink", price: "169", image: "img/wrap_combo.jpeg" },
        { title: "Snack Combo", subtitle: "Signature Momos + Fresh Lime Juice", price: "159", image: "img/snack_combo.jpeg" },
        { title: "Tea Time Combo", subtitle: "Hot Tea + Crispy Pazham Pori", price: "39", image: "img/tea_combo.jpeg" },
        { title: "Chicken Cheese Burger", subtitle: "Juicy Patty with Extra Melted Cheese", price: "150", image: "img/cheese_burger.jpeg" },
        { title: "Chicken Wrap", subtitle: "BBQ / Peri Peri Signature Wrap", price: "140", image: "img/chicken_wrap.jpeg" },
        { title: "Signature Momos", subtitle: "6 Pcs • Steamed Chicken", price: "135", image: "img/momos.jpeg" },
        { title: "Chicken Nuggets", subtitle: "6 Pcs • Crispy & Tender", price: "140", image: "img/nuggets.jpeg" },
        { title: "Loaded Fries", subtitle: "Crispy & Seasoned", price: "149", image: "img/loaded_fries.jpeg" },
        { title: "Chicken Fried Rice", subtitle: "Classic Wok-Tossed Savory Rice", price: "160", image: "img/fried_rice.jpeg" },
        { title: "Sharjah Shake", subtitle: "Classic Creamy Favorite", price: "90", image: "img/sharjah_shake.jpeg" },
        { title: "Cold Coffee", subtitle: "Classic Creamy & Frothy", price: "95", image: "img/cold_coffee.jpeg" },
        { title: "Oreo Shake", subtitle: "Rich Chocolate & Crunchy Cookies", price: "120", image: "img/oreo_shake.jpeg" },
        { title: "Watermelon Juice", subtitle: "100% Fresh & Chilled", price: "70", image: "img/watermelon.jpeg" },
        { title: "Pineapple Juice", subtitle: "Sweet, Tropical & Refreshing", price: "80", image: "img/pineapple.jpeg" },
        { title: "Fresh Lime Soda", subtitle: "Zesty & Sparkling", price: "40", image: "img/lime_soda.jpeg" }
    ];

    const container = document.getElementById('menu-container');
    let currentSlide = 0;
    let slideInterval;

    function orderViaWhatsApp(itemName, price) {
        const phoneNumber = "918848170406"; 
        const urlParams = new URLSearchParams(window.location.search);
        const tableNumber = urlParams.get('table') || "Counter/Takeaway";
        const message = `*New Order!*\n\n*Table:* ${tableNumber}\n*Item:* ${itemName}\n*Price:* ₹${price}`;
        const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
        window.open(whatsappUrl, '_blank');
    }

    // Pre-render slides so they are ready behind the start screen
    function renderSlides() {
        container.innerHTML = slides.map((slide, index) => `
            <div class="slide absolute inset-0 ${index === 0 ? 'active' : ''}" id="slide-${index}">
                <div class="absolute inset-0 bg-black">
                    <img src="${encodeURI(slide.image)}" class="w-full h-full object-cover ken-burns" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=1920'">
                    <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-black/95 via-black/70 md:via-black/40 to-transparent"></div>
                </div>
                <div class="absolute inset-0 flex flex-col justify-end md:justify-center p-6 sm:p-10 md:px-20 pb-20 md:pb-0 z-20 w-full md:w-3/4 lg:w-2/3">
                    <div class="flex items-center gap-3 mb-3 md:mb-4">
                        <div class="w-4 md:w-6 h-[2px] bg-yellow-500"></div>
                        <span class="text-yellow-500 font-bold text-[9px] md:text-[11px] uppercase tracking-[0.4em]">Beans n Leaves</span>
                    </div>
                    
                    <h2 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black text-white mb-2 md:mb-4 leading-tight uppercase tracking-tight shadow-black drop-shadow-lg">${slide.title}</h2>
                    <p class="text-lg sm:text-xl md:text-2xl text-white/80 mb-6 md:mb-8 font-medium tracking-wide max-w-md drop-shadow-md">${slide.subtitle}</p>
                    
                    <div class="flex items-center">
                        <div onclick="orderViaWhatsApp('${slide.title}', '${slide.price}')" 
                             class="bg-white text-black px-6 py-3 md:px-8 md:py-4 rounded-xl md:rounded-2xl shadow-xl flex items-center gap-2 transform -rotate-1 border-b-4 border-gray-200 cursor-pointer hover:bg-yellow-400 hover:-translate-y-1 transition-all duration-300 active:scale-95">
                            <div class="flex items-baseline gap-1">
                                <span class="text-base md:text-lg font-bold">₹</span>
                                <span class="text-4xl md:text-6xl font-black">${slide.price}</span>
                            </div>
                            <div class="flex flex-col border-l-2 border-black/10 pl-2 ml-1 md:pl-3 md:ml-2">
                                <span class="text-xs md:text-sm font-black uppercase tracking-wider">Order</span>
                                <span class="text-[10px] md:text-xs font-bold text-black/60 uppercase tracking-wider">Now</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function nextSlide() {
        const current = document.getElementById('slide-' + currentSlide);
        if(current) current.classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        const next = document.getElementById('slide-' + currentSlide);
        if(next) {
            next.classList.add('active');
            const img = next.querySelector('img');
            if(img) { 
                img.style.animation = 'none'; 
                img.offsetHeight; 
                img.style.animation = null; 
            }
        }
    }

    // Function triggered when the user taps the start screen
    function startExperience() {
        // 1. Request Fullscreen
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen().catch(err => console.log("Fullscreen blocked by browser"));
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen().catch(err => console.log("Fullscreen blocked"));
        } else if (elem.msRequestFullscreen) { /* IE11 */
            elem.msRequestFullscreen().catch(err => console.log("Fullscreen blocked"));
        }

        // 2. Hide Start Overlay
        document.getElementById('start-overlay').classList.add('fade-out');
        setTimeout(() => {
            document.getElementById('start-overlay').style.display = 'none';
        }, 500);

        // 3. Start the progress bar and slideshow timer
        document.getElementById('progress-bar').classList.remove('hidden');
        document.getElementById('progress-bar').classList.add('progress-bar-fill');
        slideInterval = setInterval(nextSlide, 6000);
    }

    // Pre-render on load, but wait for user interaction to start timers
    window.onload = () => { 
        renderSlides(); 
    };
</script>
</body>
</html>
